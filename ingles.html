    <style>
        :root {
            --blue: #2196f3;
            --green: #4caf50;
            --red: #f44336;
            --yellow: #ffc107;
            --purple: #673ab7;
            --radius: 14px;
            /* menos redondeo = más tarjeta */
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: url('https://www.h50.es/wp-content/uploads/2019/03/52323A7E-E505-49EF-AB9E-FFCA398A2AC4.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;

        }

        h1 {
            font-family: "Patrick Hand SC", cursive;
            text-align: center;
            margin: 20px 0 12px;
            font-size: 2rem;
        }

        /* ---------- TABS ---------- */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .tabs button {
            padding: 10px 22px;
            border: none;
            border-radius: 999px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
        }

        .tabs button.active {
            background: var(--blue);
            color: white;
        }

        /* ---------- SECTIONS ---------- */
        .section {
            display: none;
            max-width: 440px;
            margin: 0 auto;
            padding: 0 12px;
        }

        .section.active {
            display: block;
        }

        /* ---------- CARD AREA ---------- */
        .card-wrapper {
            width: 100%;
            height: 500px;
            /* altura fija tipo tarjeta */
            margin-bottom: 24px;

        }

        .card-container {
            perspective: 1200px;
            height: 100%;
        }

        .card {
            height: 100%;
            cursor: pointer;
        }

        .card-inner {
            height: 100%;
            transition: transform 0.3s ease;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* ---------- CARD FACE ---------- */
        .card-face {
            position: absolute;
            inset: 0;
            border-radius: var(--radius);

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 18px 20px;
            box-sizing: border-box;

            font-family: "Patrick Hand SC", cursive;
            font-size: clamp(1.05rem, 3.2vw, 1.35rem);
            line-height: 1.3;
            text-align: center;

            overflow: hidden;
            word-break: break-word;
            white-space: normal;

            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
            backface-visibility: hidden;
        }

        .front {
            background: #ffffff;
            color: #111;
        }

        .back {
            background: var(--blue);
            color: white;
            transform: rotateY(180deg);
        }

        /* ---------- CONTROLS ---------- */
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            border: none;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .play {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--green);
            color: white;
            font-size: 1.2rem;
        }

        .fail {
            background: var(--red);
            color: white;
        }

        .mark {
            background: var(--yellow);
        }

        .mode {
            background: var(--purple);
            color: white;
        }

        .pdf {
            background: var(--blue);
            color: white;
        }

        /* ---------- SEARCH ---------- */
        input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border-radius: 10px;
            border: none;
        }

        .result {
            background: white;
            color: black;
            padding: 16px;
            border-radius: 14px;
            margin-top: 12px;
            font-size: 1rem;
        }

        /* ---------- MOBILE ---------- */
        @media (max-width:480px) {
            .card-wrapper {
                height: 110px;
            }

            h1 {
                font-size: 1.7rem;
            }
        }

        .volver {
            background-color: #000000;
            color: #0091ff;
            font-weight: bold;
        }
    </style>
</head>

                { "es": "visado de tránsito", "en": "transit visa" },
                { "es": "vista", "en": "hearing / trial" },
                { "es": "vista preliminar", "en": "preliminary hearing / pre-trial" },
                { "es": "vista pública", "en": "public hearing" },
                { "es": "vulneración", "en": "breach" },
                { "es": "vulnerar", "en": "breach / break" },
                { "es": "yonqui", "en": "junkie / junki" },
                { "es": "zona", "en": "zone" },
                { "es": "zona fronteriza", "en": "border land" },
                { "es": "zulo", "en": "hidding place / stook" }






            ]))
        ])];

        let current;
        let failed = JSON.parse(localStorage.getItem("failed")) || [];
        let marked = JSON.parse(localStorage.getItem("marked")) || [];
        let selectionMode = false;

        const spanish = document.getElementById("spanish");
        const english = document.getElementById("english");
        const card = document.getElementById("card");

        function getPool() {
            if (selectionMode && marked.length) return marked;
            return cards;
        }

        function nextCard() {
            const pool = getPool();
            if (!pool.length) return alert("No hay tarjetas en este modo");
            card.classList.remove("flipped");
            setTimeout(() => {
                current = pool[Math.floor(Math.random() * pool.length)];
                spanish.textContent = current.es;
                english.textContent = current.en;
            }, 300);
        }

        card.onclick = () => card.classList.toggle("flipped");

        function speak() {
            if (!current) return;

            const parts = current.en.split("/").map(p => p.trim());

            speechSynthesis.cancel();

            parts.forEach((part, i) => {
                const utter = new SpeechSynthesisUtterance(part);
                utter.lang = "en-US";

                setTimeout(() => {
                    speechSynthesis.speak(utter);
                }, i * 5000); // 3 segundos de pausa entre partes
            });
        }

        function markFail() {
            if (!failed.find(f => f.es === current.es)) {
                failed.push(current);
                localStorage.setItem("failed", JSON.stringify(failed));
            }
        }

        function toggleMark() {
            const i = marked.findIndex(m => m.es === current.es);
            if (i === -1) marked.push(current);
            else marked.splice(i, 1);
            localStorage.setItem("marked", JSON.stringify(marked));
        }

        function toggleMode() {
            selectionMode = !selectionMode;
            alert(selectionMode ? "Modo selección activado" : "Modo normal");
        }

        function clean(t) {
            return t.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text("Inglés técnico policial – Palabras falladas", 20, 20);
            let y = 35;
            failed.forEach(f => {
                const es = clean(f.es);
                const en = clean(f.en);
                doc.setFontSize(12);
                doc.text(`• ${es}`, 25, y);
                y += 6;
                doc.text(doc.splitTextToSize(`→ ${en}`, 150), 30, y);
                y += 10;
            });
            doc.save("errores-ingles-policial.pdf");
        }

        function searchWord() {
            const v = q.value.toLowerCase();
            const f = cards.find(c => c.es.toLowerCase().includes(v) || c.en.toLowerCase().includes(v));
            result.textContent = f ? `${f.es} → ${f.en}` : "No encontrada";
        }

        function showTab(id) {
            document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
            document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
            event.target.classList.add("active");
        }




        nextCard();
    </script>

</body>
